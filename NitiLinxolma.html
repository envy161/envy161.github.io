<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Главы</title>
  <style>
    :root {
      color-scheme: light dark;
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.16);
      --hover: rgba(255,255,255,0.05);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --text: rgba(35,35,35,0.92);
        --muted: rgba(35,35,35,0.14);
        --hover: rgba(35,35,35,0.05);
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
    }

    body {
      padding: 4px 0;
    }

    .chapters {
      width: 100%;
      background: transparent;
    }

    .chapter {
      display: block;
      text-decoration: none;
      color: var(--text);
      padding: 12px 0;
      border-top: 1px solid var(--muted);
      transition: background 0.2s ease, padding-left 0.2s ease;
    }

    .chapter:first-child {
      border-top: 0;
    }

    .chapter:hover {
      background: var(--hover);
      padding-left: 6px;
    }

    .chapter-title {
      display: block;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="chapters">
    <a class="chapter" href="https://storyhearth.ru/LWMfwq-ysla" target="_top">
      <span class="chapter-title">Глава 1 — «Рынок Линнхольма»</span>
    </a>

    <a class="chapter" href="https://storyhearth.ru/kg-3CPT3m3H" target="_top">
      <span class="chapter-title">Глава 2 — «Книга без имени»</span>
    </a>

    <a class="chapter" href="https://storyhearth.ru/Zc2ohYf98IC" target="_top">
      <span class="chapter-title">Глава 3 — «Первый узел»</span>
    </a>

    <a class="chapter" href="https://storyhearth.ru/Y-FULih6x0V" target="_top">
      <span class="chapter-title">Глава 4 — «Якорь»</span>
    </a>

    <a class="chapter" href="https://storyhearth.ru/BuH9wHTgsYG" target="_top">
      <span class="chapter-title">Глава 5 — «Ремешок»</span>
    </a>

    <a class="chapter" href="https://storyhearth.ru/meoNfksSNfm" target="_top">
      <span class="chapter-title">Глава 6 — «Железо в голосе»</span>
    </a>

    <a class="chapter" href="https://storyhearth.ru/1Gf6LfjygF1" target="_top">
      <span class="chapter-title">Глава 7 — «Подозрение»</span>
    </a>
  </div>
</body>
</html>
