<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Главы</title>
  <style>
    :root {
      color-scheme: light dark;
      --text: rgba(60, 60, 60, 0.92);
      --border: rgba(120, 120, 120, 0.22);
      --hover: rgba(120, 120, 120, 0.08);
      --panel: rgba(255, 255, 255, 0.02);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: rgba(255, 255, 255, 0.92);
        --border: rgba(255, 255, 255, 0.14);
        --hover: rgba(255, 255, 255, 0.06);
        --panel: rgba(255, 255, 255, 0.02);
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
    }

    body {
      padding: 4px 0;
    }

    .menu {
      width: 100%;
    }

    .toggle {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 15px;
      line-height: 1.3;
      text-align: left;
      cursor: pointer;
    }

    .toggle:hover {
      background: var(--hover);
    }

    .list {
      display: none;
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--panel);
    }

    .list.open {
      display: block;
    }

    .list a {
      display: block;
      padding: 11px 14px;
      text-decoration: none;
      color: var(--text);
      font-size: 15px;
      line-height: 1.35;
      border-top: 1px solid var(--border);
    }

    .list a:first-child {
      border-top: 0;
    }

    .list a:hover {
      background: var(--hover);
    }
  </style>
</head>
<body>
  <div class="menu">
    <button class="toggle" id="toggleBtn">Главы</button>

    <div class="list" id="chapterList">
      <a href="https://storyhearth.ru/LWMfwq-ysla" target="_top">Глава 1 — «Рынок Линнхольма»</a>
      <a href="https://storyhearth.ru/kg-3CPT3m3H" target="_top">Глава 2 — «Книга без имени»</a>
      <a href="https://storyhearth.ru/Zc2ohYf98IC" target="_top">Глава 3 — «Первый узел»</a>
      <a href="https://storyhearth.ru/Y-FULih6x0V" target="_top">Глава 4 — «Якорь»</a>
      <a href="https://storyhearth.ru/BuH9wHTgsYG" target="_top">Глава 5 — «Ремешок»</a>
    </div>
  </div>

  <script>
    const btn = document.getElementById('toggleBtn');
    const list = document.getElementById('chapterList');

    btn.addEventListener('click', () => {
      list.classList.toggle('open');
      btn.textContent = list.classList.contains('open') ? 'Скрыть главы' : 'Главы';
    });
  </script>
</body>
</html>
