<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Главы</title>
  <style>
    :root {
      color-scheme: light dark;
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.7);
      --border: rgba(255,255,255,0.14);
      --hover: rgba(255,255,255,0.05);
      --panel: rgba(255,255,255,0.02);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --text: rgba(40,40,40,0.92);
        --muted: rgba(40,40,40,0.72);
        --border: rgba(40,40,40,0.14);
        --hover: rgba(40,40,40,0.05);
        --panel: rgba(40,40,40,0.02);
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
    }

    body {
      padding: 4px 0;
    }

    .accordion {
      width: 100%;
    }

    .accordion-btn {
      width: 100%;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .accordion-btn:hover {
      background: var(--hover);
    }

    .accordion-btn::after {
      content: "▾";
      float: right;
      opacity: 0.75;
      transition: transform 0.2s ease;
    }

    .accordion-btn.open::after {
      transform: rotate(-180deg);
    }

    .panel {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: transparent;
      display: none;
    }

    .panel.open {
      display: block;
    }

    .chapter {
      display: block;
      padding: 14px 18px;
      text-decoration: none;
      color: var(--text);
      border-top: 1px solid var(--border);
      font-size: 15px;
      line-height: 1.35;
      transition: background 0.2s ease;
    }

    .chapter:first-child {
      border-top: 0;
    }

    .chapter:hover {
      background: var(--hover);
    }

    .chapter-title {
      display: block;
      font-weight: 600;
    }

    .chapter-sub {
      display: block;
      margin-top: 2px;
      font-size: 13px;
      color: var(--muted);
    }

    .wrap {
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="accordion">
      <button class="accordion-btn" id="chaptersBtn">Главы</button>

      <div class="panel" id="chaptersPanel">
        <a class="chapter" href="https://storyhearth.ru/LWMfwq-ysla" target="_top">
          <span class="chapter-title">Глава 1 — «Рынок Линнхольма»</span>
        </a>

        <a class="chapter" href="https://storyhearth.ru/kg-3CPT3m3H" target="_top">
          <span class="chapter-title">Глава 2 — «Книга без имени»</span>
        </a>

        <a class="chapter" href="https://storyhearth.ru/Zc2ohYf98IC" target="_top">
          <span class="chapter-title">Глава 3 — «Первый узел»</span>
        </a>

        <a class="chapter" href="https://storyhearth.ru/Y-FULih6x0V" target="_top">
          <span class="chapter-title">Глава 4 — «Якорь»</span>
        </a>

        <a class="chapter" href="https://storyhearth.ru/BuH9wHTgsYG" target="_top">
          <span class="chapter-title">Глава 5 — «Ремешок»</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    const btn = document.getElementById('chaptersBtn');
    const panel = document.getElementById('chaptersPanel');

    btn.addEventListener('click', () => {
      btn.classList.toggle('open');
      panel.classList.toggle('open');
      btn.textContent = panel.classList.contains('open') ? 'Скрыть главы' : 'Главы';
    });
  </script>
</body>
</html>
